name: Verify

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: allude
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d allude"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --command "postgres -c log_statement=all -c log_min_duration_statement=0"
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/allude?sslmode=disable
    defaults:
      run:
        working-directory: services/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/api/go.mod
          cache-dependency-path: services/api/go.mod

      - name: Verify backend builds
        run: go build ./...

      - name: Run backend tests
        run: go test -count=1 -v ./...

  swift-app:
    name: Swift App (macOS)
    runs-on: macos-15
    defaults:
      run:
        working-directory: apps/macos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Swift version
        run: swift --version

      - name: Resolve package
        run: swift package resolve

      - name: Verify Swift app builds
        run: swift build
