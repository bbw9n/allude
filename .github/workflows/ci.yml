name: Verify

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/api/go.mod
          cache-dependency-path: services/api/go.mod

      - name: Verify backend builds
        run: go build ./...

      - name: Run backend tests
        run: go test ./...

  swift-app:
    name: Swift App (macOS)
    runs-on: macos-15
    defaults:
      run:
        working-directory: apps/macos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Swift version
        run: swift --version

      - name: Resolve package
        run: swift package resolve

      - name: Verify Swift app builds
        run: swift build
